<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-app);font-family:var(--font-display);}
  .glow{background:var(--grad-app-glow);}
  h1{margin:0;font-weight:700;letter-spacing:var(--ls-tight);color:var(--text-strong);line-height:1.05;}
  .g{background:var(--grad-dating);-webkit-background-clip:text;background-clip:text;color:transparent;}
  small{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);}
</style></head>
<body class="glow">
  <h1 style="font-size:44px">Where stable relationships begin <span class="g">🐴</span></h1>
  <h1 class="g" style="font-size:32px;margin-top:12px">Storm, 6</h1>
  <small>Space Grotesk · 700 / 500 · letter-spacing −0.03em</small>
</body></html>
