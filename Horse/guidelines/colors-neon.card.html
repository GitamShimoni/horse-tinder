<!-- @dsCard group="Colors" viewport="700x150" name="Neon dating ramp" subtitle="Pink → orange — the core brand energy" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-app);font-family:var(--font-body);}
  .row{display:flex;gap:10px;}
  .sw{flex:1;height:86px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;border:1px solid var(--border-hairline);}
  .sw b{font-family:var(--font-body);font-size:12px;color:#fff;font-weight:700;}
  .sw span{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,.8);}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--neon-pink)"><b>Pink</b><span>#ff2d78</span></div>
  <div class="sw" style="background:var(--neon-rose)"><b>Rose</b><span>#ff4d8d</span></div>
  <div class="sw" style="background:var(--neon-magenta)"><b>Magenta</b><span>#e8368f</span></div>
  <div class="sw" style="background:var(--neon-orange)"><b>Orange</b><span>#ff7a18</span></div>
  <div class="sw" style="background:var(--neon-amber)"><b style="color:#2a1c02">Amber</b><span style="color:#2a1c02">#ff9d3c</span></div>
</div>
</body></html>
