<!-- @dsCard group="Brand" viewport="700x230" name="Glassmorphism treatment" subtitle="Frosted panels over the neon glow" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:0;font-family:var(--font-body);}
  .bg{padding:28px;background:radial-gradient(90% 120% at 20% 0%,rgba(255,45,120,.4),rgba(6,10,21,0) 55%),radial-gradient(90% 120% at 90% 100%,rgba(255,122,24,.34),rgba(6,10,21,0) 55%),var(--slate-950);display:flex;gap:18px;}
  .g{flex:1;background:var(--surface-card);border:1px solid var(--border-hairline);border-radius:22px;padding:20px;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:var(--shadow-md);}
  .g h4{margin:0 0 6px;font-family:var(--font-display);color:var(--text-strong);font-size:16px;}
  .g p{margin:0;color:var(--text-muted);font-size:13px;line-height:1.5;}
  .g.strong{background:var(--surface-glass-strong);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);}
</style></head>
<body>
<div class="bg">
  <div class="g"><h4>Standard glass</h4><p>rgba(30,41,59,.55) fill · 18px blur · hairline border · deep shadow. The default surface for cards & panels.</p></div>
  <div class="g strong"><h4>Strong glass</h4><p>Darker fill + 28px blur. Use over busy imagery like the profile hero so text stays legible.</p></div>
</div>
</body></html>
