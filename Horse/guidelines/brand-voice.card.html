<!-- @dsCard group="Brand" viewport="700x210" name="Voice & tone" subtitle="Deadpan luxury + relentless horse puns" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-app);font-family:var(--font-body);}
  .r{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start;}
  .do,.dont{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.1em;padding:3px 8px;border-radius:999px;flex-shrink:0;margin-top:2px;}
  .do{color:var(--emerald-300);background:rgba(52,211,153,.14);border:1px solid rgba(52,211,153,.4);}
  .dont{color:#fca5a5;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);}
  p{margin:0;color:var(--text-body);font-size:15px;line-height:1.5;}
  em{color:var(--text-muted);font-style:normal;font-size:13px;}
</style></head>
<body>
  <div class="r"><span class="do">SAY</span><p>"Looking for a stable relationship. No horsing around." <em>— deadpan, pun-forward, confident</em></p></div>
  <div class="r"><span class="do">SAY</span><p>"Bluetooth step tracking for when they spot an attractive mare." <em>— absurd luxury, played straight</em></p></div>
  <div class="r"><span class="dont">NOT</span><p>"Find your perfect equine companion today!" <em>— generic, salesy, no wit</em></p></div>
</body></html>
