<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="Display → micro, with tokens" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg-app);font-family:var(--font-body);}
  .r{display:flex;align-items:baseline;gap:16px;padding:5px 0;border-bottom:1px solid var(--border-subtle);}
  .r span:first-child{color:var(--text-strong);font-family:var(--font-display);font-weight:700;letter-spacing:-.02em;flex:1;}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);}
</style></head>
<body>
  <div class="r"><span style="font-size:44px">Display</span><span class="tok">--fs-display 44</span></div>
  <div class="r"><span style="font-size:32px">Heading 1</span><span class="tok">--fs-h1 32</span></div>
  <div class="r"><span style="font-size:24px">Heading 2</span><span class="tok">--fs-h2 24</span></div>
  <div class="r"><span style="font-size:17px">Card title</span><span class="tok">--fs-title 17</span></div>
  <div class="r"><span style="font-size:15px;font-weight:500">Body</span><span class="tok">--fs-body 15</span></div>
  <div class="r"><span style="font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase">Eyebrow</span><span class="tok">--fs-micro 10</span></div>
</body></html>
