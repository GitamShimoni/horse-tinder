<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg-app);font-family:var(--font-mono);}
  .r{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
  .bar{height:16px;background:var(--grad-dating);border-radius:4px;}
  .lbl{font-size:11px;color:var(--text-muted);width:120px;}
</style></head>
<body>
  <div class="r"><span class="lbl">--space-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="lbl">--space-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="lbl">--space-6 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="lbl">--space-8 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="r"><span class="lbl">--space-12 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="r"><span class="lbl">--space-20 · 80</span><div class="bar" style="width:80px"></div></div>
</body></html>
