<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 26px; font-family: var(--font-body); background: var(--bg-app); }
  .canvas { background: var(--grad-app-glow); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 18px; }
  .lbl { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--text-faint); font-weight: 700; width: 100%; margin-bottom: 2px; }

<body>
<div id="root" class="canvas"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, IconButton, Avatar, Icon } = window.Horse_7cfa43;
  function Demo() {
    return (
      <div>
        <div className="row"><span className="lbl">Button variants</span>
          <Button variant="primary" iconLeft="zap">Go Premium</Button>
          <Button variant="gold" iconLeft="crown">Buy Now</Button>
          <Button variant="emerald" iconLeft="gem">Marketplace</Button>
          <Button variant="secondary">Skip</Button>
          <Button variant="ghost">Ghost</Button>
          <Button variant="danger">Unmatch</Button>
        </div>
        <div className="row"><span className="lbl">Sizes & disabled</span>
          <Button size="sm">Small</Button>
          <Button size="md">Medium</Button>
          <Button size="lg">Large</Button>
          <Button disabled>Disabled</Button>
        </div>
        <div className="row"><span className="lbl">IconButton — swipe deck</span>
          <IconButton icon="rotateCcw" tone="neutral" label="Rewind" />
          <IconButton icon="x" tone="nope" size="lg" label="Nope" />
          <IconButton icon="zap" tone="super" label="Super" />
          <IconButton icon="heart" tone="love" size="lg" label="Like" />
          <IconButton icon="carrot" tone="like" label="Treat" />
        </div>
        <div className="row"><span className="lbl">Avatars</span>
          <Avatar emoji="🐴" size="lg" ring="neon" online />
          <Avatar emoji="🦄" size="lg" ring="gold" />
          <Avatar emoji="🐎" size="md" ring="emerald" />
          <Avatar initials="ST" size="md" />
          <span style={{display:'flex',gap:6,color:'var(--text-body)'}}>
            <Icon name="sparkles" /><Icon name="flame" /><Icon name="crown" /><Icon name="wine" /><Icon name="bluetooth" /><Icon name="activity" />
          </span>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
