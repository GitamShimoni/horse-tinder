<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation & neon glow" subtitle="Depth shadows + colored glow rings" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:28px 22px;background:var(--bg-app);font-family:var(--font-mono);display:flex;gap:26px;align-items:center;flex-wrap:wrap;}
  .b{width:96px;height:66px;background:var(--slate-800);border:1px solid var(--border-hairline);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-muted);text-align:center;padding:6px;}
</style></head>
<body>
  <div class="b" style="box-shadow:var(--shadow-md)">shadow-md</div>
  <div class="b" style="box-shadow:var(--shadow-lg)">shadow-lg</div>
  <div class="b" style="box-shadow:var(--glow-ring-pink)">glow pink</div>
  <div class="b" style="box-shadow:var(--glow-ring-gold)">glow gold</div>
  <div class="b" style="box-shadow:var(--glow-ring-emerald)">glow emerald</div>
  <div class="b" style="box-shadow:var(--glow-ring-super)">glow super</div>
</body></html>
