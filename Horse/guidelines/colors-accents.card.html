<!-- @dsCard group="Colors" viewport="700x150" name="Marketplace accents" subtitle="Gold = premium · Emerald = verified/new" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-app);font-family:var(--font-body);}
  .row{display:flex;gap:10px;}
  .sw{flex:1;height:86px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;border:1px solid var(--border-hairline);}
  .sw b{font-size:12px;font-weight:700;}
  .sw span{font-family:var(--font-mono);font-size:10px;opacity:.85;}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--gold-400)"><b style="color:#2a1c02">Gold 400</b><span style="color:#2a1c02">#fcd34d</span></div>
  <div class="sw" style="background:var(--gold-500)"><b style="color:#2a1c02">Gold 500</b><span style="color:#2a1c02">#f5b524</span></div>
  <div class="sw" style="background:var(--gold-600)"><b style="color:#2a1c02">Gold 600</b><span style="color:#2a1c02">#d99413</span></div>
  <div class="sw" style="background:var(--emerald-400)"><b style="color:#04231a">Emerald 400</b><span style="color:#04231a">#34d399</span></div>
  <div class="sw" style="background:var(--emerald-500)"><b style="color:#04231a">Emerald 500</b><span style="color:#04231a">#10b981</span></div>
  <div class="sw" style="background:var(--sky-400)"><b style="color:#04222e">Super Sky</b><span style="color:#04222e">#38bdf8</span></div>
</div>
</body></html>
