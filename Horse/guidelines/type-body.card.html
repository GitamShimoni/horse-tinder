<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-app);font-family:var(--font-body);}
  p{margin:0 0 10px;color:var(--text-body);line-height:1.6;max-width:560px;}
  .lead{font-size:17px;color:var(--text-strong);font-weight:600;}
  .base{font-size:15px;}
  .sm{font-size:13px;color:var(--text-muted);}
  small{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);}
</style></head>
<body>
  <p class="lead">Looking for a stable relationship. No horsing around.</p>
  <p class="base">Must love long trots on the beach, organic hay, and the occasional gallop at golden hour. Swipe right if you can keep up.</p>
  <p class="sm">15,204 stallions & mares within 3 barns of you.</p>
  <small>Plus Jakarta Sans · 300–800 + italic · line-height 1.6</small>
</body></html>
