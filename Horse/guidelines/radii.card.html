<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg-app);font-family:var(--font-mono);display:flex;gap:16px;align-items:flex-end;}
  .b{width:88px;height:74px;background:var(--surface-card);border:1px solid var(--border-strong);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:10px;color:var(--text-muted);}
</style></head>
<body>
  <div class="b" style="border-radius:var(--radius-sm)">sm 12</div>
  <div class="b" style="border-radius:var(--radius-md)">md 16</div>
  <div class="b" style="border-radius:var(--radius-lg)">lg 22</div>
  <div class="b" style="border-radius:var(--radius-xl)">xl 30</div>
  <div class="b" style="border-radius:var(--radius-pill);width:120px">pill</div>
</body></html>
