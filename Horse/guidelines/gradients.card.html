<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-app);font-family:var(--font-body);}
  .row{display:flex;gap:12px;}
  .sw{flex:1;height:96px;border-radius:16px;display:flex;align-items:flex-end;padding:10px;border:1px solid var(--border-hairline);}
  .sw b{font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--grad-dating)"><b>--grad-dating</b></div>
  <div class="sw" style="background:var(--grad-gold)"><b style="color:#2a1c02;text-shadow:none">--grad-gold</b></div>
  <div class="sw" style="background:var(--grad-emerald)"><b style="color:#04231a;text-shadow:none">--grad-emerald</b></div>
  <div class="sw" style="background:var(--grad-app-glow),var(--slate-950)"><b>--grad-app-glow</b></div>
</div>
</body></html>
