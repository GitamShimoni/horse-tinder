<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px;background:var(--bg-app);font-family:var(--font-body);}
  .glow{background:var(--grad-app-glow);display:flex;align-items:center;gap:40px;}
  .lock{display:flex;align-items:center;gap:16px;}
  .wm{font-family:var(--font-display);font-size:40px;font-weight:700;letter-spacing:-.03em;background:var(--grad-dating);-webkit-background-clip:text;background-clip:text;color:transparent;}
  img{height:74px;display:block;}
  small{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);}
</style></head>
<body>
<div class="glow">
  <div class="lock"><img src="../assets/trotr-mark.svg" alt="Trotr mark"><span class="wm">Trotr</span></div>
  <div>
    <div style="color:var(--text-body);font-size:14px;font-weight:600;">Where stable relationships begin.</div>
    <small>Horseshoe mark · gradient wordmark on slate-950</small>
  </div>
</div>
</body></html>
