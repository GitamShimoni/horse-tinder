<!-- @dsCard group="Colors" viewport="700x150" name="Slate canvas" subtitle="Dark-mode neutral ramp" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-app);font-family:var(--font-body);}
  .row{display:flex;gap:0;border-radius:14px;overflow:hidden;border:1px solid var(--border-hairline);}
  .sw{flex:1;height:78px;display:flex;align-items:flex-end;padding:8px;}
  .sw span{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,.85);text-shadow:0 1px 2px rgba(0,0,0,.6);}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--slate-950)"><span>950</span></div>
  <div class="sw" style="background:var(--slate-900)"><span>900</span></div>
  <div class="sw" style="background:var(--slate-800)"><span>800</span></div>
  <div class="sw" style="background:var(--slate-700)"><span>700</span></div>
  <div class="sw" style="background:var(--slate-600)"><span>600</span></div>
  <div class="sw" style="background:var(--slate-500)"><span>500</span></div>
  <div class="sw" style="background:var(--slate-400)"><span style="color:#0b1120;text-shadow:none">400</span></div>
  <div class="sw" style="background:var(--slate-300)"><span style="color:#0b1120;text-shadow:none">300</span></div>
  <div class="sw" style="background:var(--slate-100)"><span style="color:#0b1120;text-shadow:none">100</span></div>
</div>
</body></html>
